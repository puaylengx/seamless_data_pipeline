options:
  logging: CLOUD_LOGGING_ONLY

# ไม่ต้องประกาศ 'substitutions:' ในไฟล์ก็ได้
# ใช้ built‑in variables ของ Cloud Build แทน (ไม่มีข้อมูลลับในไฟล์)
# เช่น PROJECT_ID / SHORT_SHA

steps:
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=asia-southeast1-docker.pkg.dev/$PROJECT_ID/etl-repo/student-info-etl:$SHORT_SHA
      - --dockerfile=./Dockerfile
      - --context=.
      - --cache=true
      - --verbosity=info

